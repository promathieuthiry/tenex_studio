<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0f0f12;
    --ink-soft:#1c1c1f;
    --paper:#ffffff;
    --paper-warm:#f5f5f5;
    --paper-cool:#f5f6f8;
    --paper-deep:#dee0e4;
    --accent:#e2231a;
    --display:'Arimo',system-ui,sans-serif;
    --sans:'Inter',system-ui,sans-serif;
    --mono:'Geist Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#fff}
  .stage{
    zoom:2;
    width:1500px;height:945px;position:relative;overflow:hidden;
    background:
      radial-gradient(100% 90% at 50% 42%,
        #ffffff 0%,
        #f2f3f6 32%,
        #dde1e7 62%,
        #c2c7d0 86%,
        #b1b7c2 100%);
    font-family:var(--sans);
    display:flex;align-items:center;justify-content:center;gap:96px;
  }

  /* lanyard straps hanging from top edge */
  .strap{position:absolute;top:-4px;width:62px;height:330px;background:var(--ink);z-index:0}
  .strap::after{content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(180deg,rgba(255,255,255,.05) 0 14px,rgba(0,0,0,.18) 14px 28px)}
  .strap.l{left:calc(50% - 318px) }
  .strap.r{left:calc(50% + 256px) }

  .badge{position:relative;z-index:1;width:392px;filter:drop-shadow(0 38px 55px rgba(15,15,18,.28))}
  .badge.front{transform:rotate(-3deg)}
  .badge.back{transform:rotate(2.4deg)}

  /* clear plastic holder top */
  .holder{position:relative;height:54px;margin:0 26px -10px;border-radius:14px 14px 0 0;
    background:linear-gradient(180deg,rgba(255,255,255,.65),rgba(220,224,230,.55));
    border:1px solid rgba(15,15,18,.10);box-shadow:inset 0 2px 6px rgba(255,255,255,.6)}
  .holder::before{content:"";position:absolute;left:50%;top:24px;transform:translateX(-50%);
    width:96px;height:11px;border-radius:9999px;background:rgba(15,15,18,.45)}

  .card{position:relative;border-radius:16px;overflow:hidden;background:var(--paper);
    box-shadow:0 0 0 1px rgba(15,15,18,.08)}

  /* ---------- FRONT ---------- */
  .front .card{padding:26px 26px 24px}
  .photo{position:relative;width:100%;aspect-ratio:1 / 1.14;background:#fff;overflow:hidden}
  .photo img{width:100%;height:100%;object-fit:cover;object-position:50% 12%;display:block}
  .tick{position:absolute;width:22px;height:22px;border:2px solid var(--ink)}
  .tick.tl{top:6px;left:6px;border-right:0;border-bottom:0}
  .tick.tr{top:6px;right:6px;border-left:0;border-bottom:0}
  .tick.bl{bottom:6px;left:6px;border-right:0;border-top:0}
  .tick.br{bottom:6px;right:6px;border-left:0;border-top:0}

  .role{margin-top:22px;font-family:var(--mono);font-size:13px;letter-spacing:.16em;
    text-transform:uppercase;color:#76767c}
  .name{font-family:var(--display);font-weight:700;color:var(--ink);
    font-size:56px;line-height:.92;letter-spacing:-.03em;text-transform:uppercase;margin-top:8px}
  .rule{height:3px;background:var(--accent);margin:22px 0 0;width:100%}
  .frow{display:flex;align-items:flex-end;justify-content:space-between;margin-top:18px}
  .brandmark{height:22px}
  .tag{font-family:var(--mono);font-size:13px;letter-spacing:.02em;color:#76767c;white-space:nowrap;margin-bottom:6px}
  .place{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9a9aa0;margin-top:6px}
  .idno{font-family:var(--mono);font-size:13px;letter-spacing:.08em;color:var(--ink)}

  /* ---------- BACK (red panel) ---------- */
  .back .card{background:var(--accent)}
  .panel{position:relative;width:100%;aspect-ratio:392/560;overflow:hidden}
  .bigword{position:absolute;top:18px;left:8px;font-family:var(--display);font-weight:700;
    color:var(--ink);font-size:108px;line-height:.84;letter-spacing:-.05em;text-transform:uppercase;
    white-space:nowrap}
  .bigword span{display:block}
  .bigmark{position:absolute;right:-14px;bottom:188px;font-family:var(--display);font-weight:700;
    font-size:236px;line-height:.8;letter-spacing:-.07em;color:#fff;opacity:.15;white-space:nowrap}
  .foot{position:absolute;left:34px;right:30px;bottom:40px;color:#fff;font-family:var(--mono)}
  .foot .rule{height:1px;background:rgba(255,255,255,.30);width:100%}
  .foot .links{margin-top:18px;display:flex;flex-direction:column;gap:7px}
  .foot .u{font-size:19px;letter-spacing:.02em;font-weight:700}
  .foot .m{font-size:19px;letter-spacing:.02em;font-weight:600}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="strap l"></div>
    <div class="strap r"></div>

    <!-- FRONT -->
    <div class="badge front">
      <div class="holder"></div>
      <div class="card">
        <div class="photo">
          <img src="photo.webp" alt="Mathieu Thiry" />
          <span class="tick tl"></span><span class="tick tr"></span>
          <span class="tick bl"></span><span class="tick br"></span>
        </div>
        <div class="role">Fondateur</div>
        <div class="name">Mathieu<br/>Thiry</div>
        <div class="rule"></div>
        <div class="frow">
          <div>
            <!-- Tenex Studio wordmark (dark) -->
            <svg class="brandmark" viewBox="0 0 720 120" xmlns="http://www.w3.org/2000/svg" aria-label="Tenex Studio">
              <text x="0" y="92" font-family="Arimo, sans-serif" font-weight="700" font-size="100" letter-spacing="-4.5" fill="#0f0f12">TeneX Studio</text>
            </svg>
          </div>
          <div class="tag">Agence Web et IA</div>
        </div>
      </div>
    </div>

    <!-- BACK -->
    <div class="badge back">
      <div class="holder"></div>
      <div class="card">
        <div class="panel">
          <div class="bigword"><span>Tenex</span><span>Studio</span></div>
          <div class="bigmark">10x</div>
          <div class="foot">
            <div class="rule"></div>
            <div class="links">
              <div class="u">www.tenex.studio</div>
              <div class="m">contact@tenex.studio</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
