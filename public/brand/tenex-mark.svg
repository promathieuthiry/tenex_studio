<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120" role="img" aria-label="Tenex Studio">
  <title>Tenex Studio</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Arimo:wght@700&amp;display=swap');
      .wm { font-family: 'Arimo', system-ui, -apple-system, 'Helvetica Neue', sans-serif; font-weight: 700; }
    </style>
  </defs>

  <!-- "Ten" -->
  <text class="wm" x="0" y="92" font-size="100" letter-spacing="-4.5" fill="#000000">Ten</text>

  <!-- lowercase "e" = the "typo", same height as Ten, lighter, right after -->
  <text class="wm" x="156" y="92" font-size="100" fill="#9a9a9a">e</text>

  <!-- knockout bar: same color as page background so the e looks sliced -->
  <path d="M152,86 C172,72 196,56 216,40" fill="none" stroke="#ffffff"
        stroke-width="12" stroke-linecap="butt"/>

  <!-- red square ONLY on the X -->
  <rect x="218" y="4" width="104" height="104" fill="#E2231A"/>
  <text class="wm" x="270" y="92" font-size="100" text-anchor="middle" fill="#ffffff">X</text>

  <!-- "Studio" -->
  <text class="wm" x="344" y="92" font-size="100" letter-spacing="-4.5" fill="#000000">Studio</text>
</svg>
